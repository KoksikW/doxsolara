<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>imgboard • dox style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            font-family: 'Courier New', 'Liberation Mono', 'Consolas', monospace;
            color: #b0b0b0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 8px solid #1a1a1a;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.95);
        }

        /* --- ЗАГЛУШКА ДЛЯ ВЕРТИКАЛЬНЫХ ЭКРАНОВ --- */
        #rotate-device {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            z-index: 100000;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ff69b4;
        }

        .rotate-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: phoneRotate 2s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(255,105,180,0.8);
        }

        .rotate-text {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,105,180,0.8);
            line-height: 1.8;
        }

        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* --- ЭКРАН ВХОДА --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        #splash-text {
            color: #ff69b4;
            font-size: 2rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,105,180,0.8);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* --- ПАДАЮЩИЕ КАРТИНКИ --- */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            top: -150px;
            opacity: 0.6;
            pointer-events: none;
            user-select: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* ==========================================================================
           --- БАЗОВЫЕ СТИЛИ (ДЛЯ ПК) - ОСТАВЛЕНО БЕЗ ИЗМЕНЕНИЙ ---
           ========================================================================== */
        
        .square-photo {
            position: absolute;
            border: 3px solid rgba(255,105,180,0.4);
            overflow: hidden;
            background: transparent;
            box-shadow: 0 0 15px rgba(255,105,180,0.3),
                        0 0 30px rgba(255,105,180,0.1);
            transition: all 0.3s ease;
            filter: grayscale(0.5) contrast(1.2);
            z-index: 1;
        }

        .top-photo { 
            width: clamp(150px, 24vw, 460px); 
            height: clamp(110px, 18.7vw, 360px); 
        }
        
        .bottom-photo { 
            width: clamp(180px, 29vw, 560px); 
            height: clamp(110px, 18.7vw, 360px); 
        }

        .square-photo:hover {
            border-color: rgba(255,105,180,0.8);
            box-shadow: 0 0 30px rgba(255,105,180,0.6),
                        0 0 60px rgba(255,105,180,0.3),
                        0 0 100px rgba(255,105,180,0.15);
            filter: grayscale(0) contrast(1.3);
            transform: scale(1.08);
            z-index: 10;
        }

        .square-photo img,
        .square-photo video {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }

        .photo-1 { top: 5%; left: calc(5% + clamp(10px, 2.5vw, 50px)); }
        .photo-2 { top: 5%; right: calc(5% + clamp(10px, 2.5vw, 50px)); }
        .photo-3 { bottom: 5%; left: 5%; }
        .photo-4 { bottom: 5%; right: 5%; }

        .main-photo-wrapper {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(100px, 13vw, 250px);
            height: clamp(100px, 13vw, 250px);
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .main-photo-wrapper:hover {
            transform: translateX(-50%) scale(1.08);
            z-index: 10;
        }

        .main-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255,105,180,0.4);
            overflow: hidden;
            background: transparent;
            box-shadow: 0 0 15px rgba(255,105,180,0.3),
                        0 0 30px rgba(255,105,180,0.1);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
            filter: grayscale(0.5) contrast(1.2);
            animation: rotateClockwise 10s linear infinite;
        }

        @keyframes rotateClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .main-photo-wrapper:hover .main-photo {
            border-color: rgba(255,105,180,0.8);
            box-shadow: 0 0 30px rgba(255,105,180,0.6),
                        0 0 60px rgba(255,105,180,0.3),
                        0 0 100px rgba(255,105,180,0.15);
            filter: grayscale(0) contrast(1.3);
        }

        .main-photo img { width: 100%; height: 100%; object-fit: cover; }

        .center-info {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.8rem, 1.5vw, 1.5rem);
            width: 100%;
            max-width: clamp(280px, 35vw, 450px);
            margin-top: clamp(140px, 20vw, 240px);
        }

        .contact-line {
            display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
            width: 100%; background: rgba(5, 5, 5, 0.6); 
            padding: clamp(0.8rem, 1.2vw, 1.2rem);
            border: 1px solid rgba(255,105,180,0.4); border-left: 4px solid rgba(255,105,180,0.6);
            color: #cccccc; text-align: center;
            box-shadow: 0 0 15px rgba(255,105,180,0.2), 0 0 30px rgba(255,105,180,0.1);
        }

        .tg-nick {
            color: #ff69b4; font-weight: bold; 
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            text-shadow: 0 0 15px rgba(255,105,180,0.8), 0 0 30px rgba(255,105,180,0.4);
        }

        .phone-number {
            color: #bbbbbb; font-family: monospace; 
            font-size: clamp(0.8rem, 1.3vw, 1.1rem);
            text-shadow: 0 0 10px rgba(255,105,180,0.3);
        }

        .bio-block {
            width: 100%; background: rgba(5, 5, 5, 0.6);
            border: 1px solid rgba(255,105,180,0.4); 
            padding: clamp(1rem, 1.5vw, 1.5rem); text-align: center;
            display: flex; flex-direction: column; gap: 0.8rem;
            box-shadow: 0 0 15px rgba(255,105,180,0.2), 0 0 30px rgba(255,105,180,0.1);
        }

        .bio-text {
            font-size: clamp(0.7rem, 1vw, 0.95rem); 
            line-height: 1.8; color: #c8c8c8; text-align: center;
            font-family: 'Courier New', monospace; word-break: break-word;
            text-shadow: 0 0 5px rgba(255,105,180,0.2);
        }

        /* ==========================================================================
           --- МОБИЛЬНАЯ ВЕРСИЯ (СТРОГО ДЛЯ ТЕЛЕФОНОВ) ---
           ========================================================================== */
        @media screen and (max-width: 950px) and (max-height: 6
